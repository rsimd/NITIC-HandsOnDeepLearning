<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forward Propagation to Loss Animation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --paper: #ffffff;
      --ink: #202124;
      --muted: #5f6368;
      --line: #d7dde5;
      --blue: #1a73e8;
      --green: #188038;
      --red: #d93025;
      --yellow: #fbbc04;
      --soft-blue: #e8f0fe;
      --soft-green: #e6f4ea;
      --soft-red: #fce8e6;
      --soft-yellow: #fff7d6;
      --shadow: 0 16px 36px rgba(60, 64, 67, .14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    h1 { margin: 0; font-size: 21px; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; }
    .controls {
      display: grid;
      grid-template-columns: auto auto auto minmax(120px, 220px);
      gap: 8px;
      align-items: center;
    }
    button {
      min-height: 34px;
      border: 1px solid #b8c8e8;
      border-radius: 6px;
      padding: 6px 12px;
      color: #174ea6;
      background: var(--soft-blue);
      font-weight: 650;
      cursor: pointer;
    }
    input[type="range"] { width: 100%; }
    main {
      display: grid;
      gap: 10px;
      width: 1540px;
      max-width: none;
      margin: 0 auto;
      padding: 10px 14px;
    }
    section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 1px 2px rgba(60, 64, 67, .05);
    }
    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }
    h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
    .small { color: var(--muted); font-size: 12px; }
    .status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      background: var(--paper);
    }
    .stat b { display: block; font-size: 19px; line-height: 1.15; }
    .stat span { color: var(--muted); font-size: 12px; }
    .formula-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 7px;
      padding: 9px;
      overflow-x: auto;
    }
    .formula {
      min-height: 68px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fbfcff;
      transition: background .25s ease, border-color .25s ease, box-shadow .25s ease, transform .25s ease;
    }
    .formula.active {
      border-color: #7baaf7;
      background: #f3f8ff;
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .formula b {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .math {
      font-family: "Times New Roman", serif;
      font-size: 16px;
      line-height: 1.25;
      white-space: nowrap;
    }
    .formula span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr);
      gap: 10px;
      padding: 10px;
    }
    .stage {
      position: relative;
      height: 410px;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(215, 221, 229, .5) 1px, transparent 1px),
        linear-gradient(rgba(215, 221, 229, .5) 1px, transparent 1px),
        #ffffff;
      background-size: 42px 42px;
    }
    .formula-stage {
      height: 100%;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 14px;
    }
    .expression {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
    }
    .shape-block {
      position: relative;
      display: grid;
      place-items: center;
      border: 2px solid var(--blue);
      border-radius: 8px;
      background: var(--soft-blue);
      box-shadow: 0 12px 26px rgba(26, 115, 232, .16);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .shape-block.result {
      border-color: var(--green);
      background: var(--soft-green);
      box-shadow: 0 12px 26px rgba(24, 128, 56, .16);
    }
    .shape-block.loss {
      border-color: var(--red);
      background: var(--soft-red);
      box-shadow: 0 12px 26px rgba(217, 48, 37, .14);
    }
    .shape-block .cells {
      inset: 7px;
      opacity: .18;
    }
    .shape-text {
      display: grid;
      gap: 5px;
      text-align: center;
      line-height: 1.15;
      z-index: 1;
    }
    .shape-text b {
      font-family: "Times New Roman", serif;
      font-size: 22px;
    }
    .shape-text span {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .operator-token,
    .function-token {
      display: grid;
      place-items: center;
      min-width: 48px;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      font-family: "Times New Roman", serif;
      font-size: 26px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(60, 64, 67, .08);
    }
    .operator-token.clickable {
      cursor: pointer;
      color: #174ea6;
      background: var(--soft-blue);
    }
    .operator-token.clickable:hover {
      border-color: #7baaf7;
      box-shadow: 0 12px 24px rgba(26, 115, 232, .16);
    }
    .function-token {
      min-width: 96px;
      padding: 0 14px;
      border-radius: 8px;
      color: #174ea6;
      background: var(--soft-blue);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      cursor: pointer;
    }
    .function-token:hover {
      border-color: #7baaf7;
      box-shadow: 0 12px 24px rgba(26, 115, 232, .16);
    }
    .function-viz {
      width: min(760px, 100%);
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 8px 18px rgba(60, 64, 67, .08);
    }
    .function-viz h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .viz-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .viz-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      background: #fbfcff;
      font-size: 12px;
    }
    .viz-card b {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 54px 1fr 42px;
      gap: 6px;
      align-items: center;
      margin: 5px 0;
      font-variant-numeric: tabular-nums;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #dfe6f3;
      overflow: hidden;
    }
    .bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }
    .viz-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .prob-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .prob-column {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      background: white;
    }
    .prob-column b {
      margin-bottom: 5px;
      font-size: 12px;
    }
    .expression-note {
      width: 100%;
      margin-top: 22px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
    .expression-break {
      flex-basis: 100%;
      height: 0;
    }
    .matrix {
      position: absolute;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: 7px;
      background: white;
      box-shadow: 0 6px 16px rgba(60, 64, 67, .08);
      transform: translate(-50%, -50%);
      transition: left .55s ease, top .55s ease, width .55s ease, height .55s ease, transform .25s ease, border-color .25s ease, background .25s ease, opacity .25s ease;
    }
    .matrix.active {
      border-color: var(--blue);
      background: var(--soft-blue);
      box-shadow: 0 16px 36px rgba(26, 115, 232, .22);
      transform: translate(-50%, -50%) scale(1.03);
      z-index: 4;
    }
    .matrix.result {
      border-color: var(--green);
      background: var(--soft-green);
    }
    .matrix.dim { opacity: .32; }
    .matrix.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.92);
    }
    .matrix.scalar {
      border-color: var(--red);
      background: var(--soft-red);
    }
    .matrix-label {
      display: grid;
      gap: 4px;
      text-align: center;
      line-height: 1.15;
      pointer-events: none;
    }
    .matrix-label b {
      font-size: 18px;
      font-family: "Times New Roman", serif;
    }
    .matrix-label span {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .cells {
      position: absolute;
      inset: 8px;
      display: grid;
      gap: 3px;
      opacity: .15;
    }
    .cell {
      border: 1px solid rgba(60, 64, 67, .24);
      border-radius: 3px;
      background: rgba(255,255,255,.68);
    }
    .matrix-values {
      position: absolute;
      inset: 7px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 3px;
      opacity: .72;
    }
    .matrix-values span {
      display: grid;
      place-items: center;
      border: 1px solid rgba(24, 128, 56, .32);
      border-radius: 3px;
      background: rgba(255,255,255,.72);
      color: #185abc;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }
    .matrix-values.vector-values {
      grid-template-columns: 1fr;
      grid-template-rows: repeat(2, 1fr);
    }
    .shape-block.emphasis {
      width: 172px !important;
      height: 124px !important;
    }
    .shape-block.emphasis .shape-text b {
      font-size: 26px;
    }
    .shape-block.emphasis .shape-text span {
      font-size: 14px;
    }
    .shape-block.emphasis .matrix-values span {
      font-size: 12px;
    }
    .op {
      position: absolute;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: white;
      color: var(--muted);
      font-weight: 800;
      transform: translate(-50%, -50%);
      transition: background .25s ease, color .25s ease, border-color .25s ease, transform .25s ease;
    }
    .op.active {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
      transform: translate(-50%, -50%) scale(1.08);
    }
    .op.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .flow-line {
      position: absolute;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(26, 115, 232, .15), rgba(26, 115, 232, .68));
      transform-origin: left center;
      opacity: .18;
      transition: opacity .25s ease;
    }
    .flow-line.active { opacity: 1; }
    .flow-line.hidden { opacity: 0; }
    .calc-line {
      position: absolute;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(24, 128, 56, .72), rgba(26, 115, 232, .2));
      transform-origin: left center;
      z-index: 1;
    }
    .calc-line::after {
      content: "";
      position: absolute;
      right: -1px;
      top: -5px;
      border-left: 10px solid rgba(24, 128, 56, .78);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }
    .side {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfcff;
    }
    .detail h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .equation-now {
      border: 1px solid #7baaf7;
      border-radius: 8px;
      padding: 12px;
      background: #f3f8ff;
      font-family: "Times New Roman", serif;
      font-size: 21px;
      line-height: 1.35;
      overflow-x: auto;
      white-space: nowrap;
    }
    .shape-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
      table-layout: fixed;
      font-size: 12px;
    }
    th, td {
      padding: 5px 6px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    th {
      color: var(--muted);
      font-weight: 650;
    }
    td {
      border-top: 1px solid #d9e4f7;
      border-bottom: 1px solid #d9e4f7;
      background: var(--soft-blue);
    }
    td:first-child {
      border-left: 1px solid #d9e4f7;
      border-radius: 5px 0 0 5px;
      text-align: center;
      font-weight: 750;
    }
    td:last-child {
      border-right: 1px solid #d9e4f7;
      border-radius: 0 5px 5px 0;
    }
    .vector {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      background: white;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .pill.active {
      border-color: #7baaf7;
      background: var(--soft-blue);
      font-weight: 750;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 0 12px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .swatch {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: -1px;
    }
    @media (max-width: 980px) {
      header { align-items: flex-start; flex-direction: column; }
      .controls { grid-template-columns: auto auto auto 1fr; width: 100%; }
      .status { grid-template-columns: repeat(2, 1fr); }
      .workspace { grid-template-columns: 1fr; }
      .stage { min-height: 560px; }
      .formula-strip { grid-template-columns: repeat(7, 170px); }
    }
    @media (max-width: 560px) {
      .status { grid-template-columns: 1fr; }
      .controls { grid-template-columns: repeat(3, auto); }
      .controls input { grid-column: 1 / -1; }
      .stage { min-height: 640px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ニューラルネットワーク: 順伝播から損失計算まで</h1>
      <div class="meta">batch_size = 2, input = 4, hidden = 5, classes = 3 の形状を行列で追う</div>
    </div>
    <div class="controls">
      <button id="play" onclick="window.__forwardToggle()">一時停止</button>
      <button id="prev" onclick="window.__forwardPrev()">戻る</button>
      <button id="next" onclick="window.__forwardNext()">進む</button>
      <input id="speed" type="range" min="800" max="2600" value="1550" step="50" aria-label="speed">
    </div>
  </header>

  <main>
    <div class="status">
      <div class="stat"><b id="stepName">入力</b><span>現在の計算</span></div>
      <div class="stat"><b id="shapeIn">(2, 4)</b><span>左から入る形状</span></div>
      <div class="stat"><b id="shapeOut">(2, 5)</b><span>出力される形状</span></div>
      <div class="stat"><b id="lossValue">-</b><span>cross entropy loss</span></div>
    </div>

    <section>
      <div class="panel-head">
        <h2>数式の流れ</h2>
        <span class="small">強調された式と行列ブロックが対応</span>
      </div>
      <div class="formula-strip" id="formulaStrip"></div>
    </section>

    <section>
      <div class="panel-head">
        <h2>行列形状のアニメーション</h2>
        <span class="small">高さ = 行数, 幅 = 列数</span>
      </div>
      <div class="workspace">
        <div class="stage" id="stage"></div>
        <aside class="side">
          <div class="detail">
            <h3>現在の数式</h3>
            <div class="equation-now" id="equationNow"></div>
            <div class="shape-note" id="shapeNote"></div>
          </div>
          <div class="detail">
            <h3 id="inputTitle">入力値</h3>
            <div id="inputValues"></div>
          </div>
          <div class="detail">
            <h3 id="outputTitle">出力値</h3>
            <div id="outputValues"></div>
          </div>
        </aside>
      </div>
      <div class="legend">
        <span><i class="swatch" style="background:var(--soft-blue); border:1px solid #7baaf7;"></i>現在参照している行列</span>
        <span><i class="swatch" style="background:var(--soft-green); border:1px solid #188038;"></i>計算で得られる行列</span>
        <span><i class="swatch" style="background:var(--soft-red); border:1px solid #d93025;"></i>最終的な損失</span>
      </div>
    </section>
  </main>

  <script>
const matrices = {
  X: { label: "X", shape: [2, 4], value: "batch_x", color: "blue" },
  W1: { label: "W¹", shape: [4, 5], value: "weight", color: "yellow" },
  b1: { label: "b¹", shape: [1, 5], value: "bias", color: "yellow" },
  Z1: { label: "Z¹", shape: [2, 5], value: "pre-activation", color: "green" },
  A1: { label: "A¹", shape: [2, 5], value: "ReLU(Z¹)", color: "green" },
  W2: { label: "W²", shape: [5, 3], value: "weight", color: "yellow" },
  b2: { label: "b²", shape: [1, 3], value: "bias", color: "yellow" },
  L: { label: "L", shape: [2, 3], value: "logits", color: "green" },
  P: { label: "P", shape: [2, 3], value: "softmax", color: "green" },
  Y: { label: "Y", shape: [2, 3], value: "one-hot", color: "blue" },
  E: { label: "E", shape: [2, 3], value: "Y ⊙ log(P)", color: "green" },
  S: { label: "S", shape: [2, 1], value: "row_sum(E)", color: "green" },
  loss: { label: "J", shape: [1, 1], value: "loss", color: "red" },
};

const steps = [
  {
    name: "入力",
    formula: "X ∈ R<sup>2×4</sup>",
    note: "2件のサンプルをまとめた mini-batch。Iris の特徴量は4個なので X は 2行4列。",
    active: ["X"],
    result: [],
    op: [],
    shapeIn: "(2, 4)",
    shapeOut: "(2, 4)",
    loss: "-",
  },
  {
    name: "1層目の線形変換",
    formula: "Z<sup>(1)</sup> = XW<sup>(1)</sup> + b<sup>(1)</sup>",
    note: "(2,4) @ (4,5) で内側の4が消え、出力は (2,5)。b¹ は各行へブロードキャストされる。",
    active: ["X", "W1", "b1"],
    result: ["Z1"],
    op: ["mul1", "add1"],
    shapeIn: "(2,4) @ (4,5)",
    shapeOut: "(2,5)",
    loss: "-",
  },
  {
    name: "活性化関数",
    formula: "A<sup>(1)</sup> = ReLU(Z<sup>(1)</sup>)",
    note: "ReLU は要素ごとに適用されるので、形状は (2,5) のまま変わらない。",
    active: ["Z1"],
    result: ["A1"],
    op: ["relu"],
    shapeIn: "(2, 5)",
    shapeOut: "(2, 5)",
    loss: "-",
  },
  {
    name: "2層目の線形変換",
    formula: "L = A<sup>(1)</sup>W<sup>(2)</sup> + b<sup>(2)</sup>",
    note: "(2,5) @ (5,3) なので出力は (2,3)。3列は iris の3クラスの logits に対応する。",
    active: ["A1", "W2", "b2"],
    result: ["L"],
    op: ["mul2", "add2"],
    shapeIn: "(2,5) @ (5,3)",
    shapeOut: "(2,3)",
    loss: "-",
  },
  {
    name: "確率へ変換",
    formula: "P = softmax(L)",
    note: "softmax は各サンプル行ごとに3クラスの確率へ変換する。行ごとの和は1になる。",
    active: ["L"],
    result: ["P"],
    op: ["softmax"],
    shapeIn: "(2, 3)",
    shapeOut: "(2, 3)",
    loss: "-",
  },
  {
    name: "正解ラベル",
    formula: "Y = one_hot(y)",
    note: "クラス番号 y=[2,0] を one-hot 行列 Y に変換する。P と同じ (2,3) なので、要素ごとの積で正解クラスだけを残せる。",

function scale(shape) {
  const rows = shape[0];
  const cols = shape[1];
  return {
    width: 32 + cols * 28,
    height: 32 + rows * 38,
  };
}

function expressionScale(shape) {
  return {
    width: 24 + shape[1] * 22,
    height: 28 + shape[0] * 32,
  };
}

function matrixHtml(key) {
  const m = matrices[key];
  const grid = Array.from({ length: Math.min(30, m.shape[0] * m.shape[1]) }, () => '<i class="cell"></i>').join("");
  return `
    <div class="cells" style="grid-template-columns: repeat(${m.shape[1]}, 1fr); grid-template-rows: repeat(${m.shape[0]}, 1fr);">${grid}</div>
    <div class="matrix-label">
      <b>${m.label}</b>
      <span>${m.shape[0]} × ${m.shape[1]}</span>
      <span>${m.value}</span>
    </div>
  `;
}

function expressionBlock(key, role = "") {
  const m = matrices[key];
  const size = expressionScale(m.shape);
  const cells = Array.from({ length: Math.min(30, m.shape[0] * m.shape[1]) }, () => '<i class="cell"></i>').join("");
  const className = ["shape-block", role].filter(Boolean).join(" ");
  const content = key === "E"
    ? `<div class="matrix-values">
        <span>0</span><span>0</span><span>log .76</span>
        <span>log .81</span><span>0</span><span>0</span>
      </div>`
    : key === "S"
    ? `<div class="matrix-values vector-values">
        <span>log .76</span>
        <span>log .81</span>
      </div>`
    : `<div class="cells" style="grid-template-columns: repeat(${m.shape[1]}, 1fr); grid-template-rows: repeat(${m.shape[0]}, 1fr);">${cells}</div>`;
  return `
    <div class="${className}" style="width:${size.width}px;height:${size.height}px;">
      ${content}
      <div class="shape-text">
        <b>${m.label}</b>
        <span>${m.shape[0]} × ${m.shape[1]}</span>
        <span>${m.value}</span>
      </div>
    </div>
  `;
}

function renderExpressionStage(stepNumber) {
  const stage = document.getElementById("stage");
  const tokens = expressionSteps[stepNumber].map(token => {
    if (token.kind === "block") return expressionBlock(token.key, token.role || "");
    if (token.kind === "fn") return `<button class="function-token" onclick="window.__showFunctionViz('${token.text}')">${token.text}</button>`;
    if (token.kind === "break") return `<div class="expression-break"></div>`;
    if (token.detail) return `<button class="operator-token clickable" onclick="window.__showOperatorViz('${token.detail}')">${token.text}</button>`;
    return `<div class="operator-token">${token.text}</div>`;
  }).join("");
  stage.innerHTML = `
    <div class="formula-stage">
      <div class="expression">${tokens}</div>
      <div class="function-viz" id="functionViz" hidden></div>
      <div class="expression-note">${steps[stepNumber].note}</div>
    </div>
  `;
}

function buildStage() {
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  Object.keys(matrices).forEach(key => {
    const m = matrices[key];
    const [left, top] = positions[key];
    const size = scale(m.shape);
    const node = document.createElement("div");
    node.className = "matrix";
    node.id = `m-${key}`;
    node.style.left = `${left}%`;
    node.style.top = `${top}%`;
    node.style.width = `${size.width}px`;
    node.style.height = `${size.height}px`;
    node.innerHTML = matrixHtml(key);
    if (m.color === "red") node.classList.add("scalar");
    stage.appendChild(node);
  });
  Object.entries(ops).forEach(([key, spec]) => {
    const node = document.createElement("div");
    node.className = "op";
    node.id = `op-${key}`;
    node.textContent = spec[0];
    node.style.left = `${spec[1]}%`;
    node.style.top = `${spec[2]}%`;
    stage.appendChild(node);
  });
  [
    [18, 24, 38, 0],
    [45, 24, 31, 0],
    [64, 24, 22, 0],
    [18, 73, 38, -4],
    [57, 68, 21, -7],
  ].forEach((line, i) => {
    const node = document.createElement("div");
    node.className = "flow-line";
    node.id = `line-${i}`;
    node.style.left = `${line[0]}%`;
    node.style.top = `${line[1]}%`;
    node.style.width = `${line[2]}%`;
    node.style.transform = `rotate(${line[3]}deg)`;
    stage.appendChild(node);
  });
}

function elementBox(id) {
  const stage = document.getElementById("stage");
  const element = document.getElementById(id);
  const er = element.getBoundingClientRect();
  const sr = stage.getBoundingClientRect();
  return {
    left: er.left - sr.left,
    right: er.right - sr.left,
    top: er.top - sr.top,
    bottom: er.bottom - sr.top,
    cx: er.left + er.width / 2 - sr.left,
    cy: er.top + er.height / 2 - sr.top,
  };
}

function drawCalcLine(fromId, toId) {
  const stage = document.getElementById("stage");
  const fb = elementBox(fromId);
  const tb = elementBox(toId);
  const goesLeft = fb.cx > tb.cx;
  const from = { x: goesLeft ? fb.left : fb.right, y: fb.cy };
  const to = { x: goesLeft ? tb.right : tb.left, y: tb.cy };
  const line = document.createElement("div");
  line.className = "calc-line";
  const length = Math.hypot(to.x - from.x, to.y - from.y);
  line.style.left = `${from.x}px`;
  line.style.top = `${from.y}px`;
  line.style.width = `${length}px`;
  line.style.transform = `rotate(${Math.atan2(to.y - from.y, to.x - from.x)}rad)`;
  stage.insertBefore(line, stage.firstChild);
}

function applyStepLayout(stepNumber) {
  const layout = stepLayouts[stepNumber];
  Object.entries(layout.matrices).forEach(([key, pos]) => {
    const node = document.getElementById(`m-${key}`);
    node.style.left = `${pos[0]}%`;
    node.style.top = `${pos[1]}%`;
  });
  Object.entries(layout.ops).forEach(([key, pos]) => {
    const node = document.getElementById(`op-${key}`);
    node.style.left = `${pos[0]}%`;
    node.style.top = `${pos[1]}%`;
  });
}

function drawStepLinks(stepNumber) {
  const stage = document.getElementById("stage");
  stage.querySelectorAll(".calc-line").forEach(node => node.remove());
  const layout = stepLayouts[stepNumber];
  layout.links.forEach(([from, to]) => {
    const fromId = from.startsWith("op:")
      ? `op-${from.slice(3)}`
      : matrices[from] ? `m-${from}` : `op-${from}`;
    const toId = to.startsWith("op:")
      ? `op-${to.slice(3)}`
      : matrices[to] ? `m-${to}` : `op-${to}`;
    drawCalcLine(fromId, toId);
  });
}

function buildFormulas() {
  const root = document.getElementById("formulaStrip");
  root.innerHTML = "";
  steps.forEach((step, i) => {
    const node = document.createElement("div");
    node.className = "formula";
    node.id = `f-${i}`;
    node.innerHTML = `<b>${i + 1}. ${step.name}</b><div class="math">${step.formula}</div><span>${step.shapeOut}</span>`;
    node.addEventListener("click", () => {
      index = i;
      render();
      schedule();
    });
    root.appendChild(node);
  });
}

function renderProbabilities() {
  const root = document.getElementById("probabilities");
  root.innerHTML = "";
  probs.flat().forEach((text) => {
    const pill = document.createElement("span");
    pill.className = "pill";
    pill.textContent = text;
    if (text === "class 2: .76" || text === "class 0: .81") pill.classList.add("active");
    root.appendChild(pill);
  });
}

function render() {
  const step = steps[index];
  const side = sidePanels[index];
  document.getElementById("stepName").textContent = step.name;
  document.getElementById("shapeIn").textContent = step.shapeIn;
  document.getElementById("shapeOut").textContent = step.shapeOut;
  document.getElementById("lossValue").textContent = step.loss;
  document.getElementById("equationNow").innerHTML = step.formula;
  document.getElementById("shapeNote").textContent = step.note;
  document.getElementById("inputTitle").textContent = side.inputTitle;
  document.getElementById("inputValues").innerHTML = side.input;
  document.getElementById("outputTitle").textContent = side.outputTitle;
  document.getElementById("outputValues").innerHTML = side.output;

  document.querySelectorAll(".formula").forEach((node, i) => node.classList.toggle("active", i === index));
  renderExpressionStage(index);
  return;
  const visible = new Set([...step.active, ...step.result]);
  document.querySelectorAll(".matrix").forEach(node => {
    const key = node.id.replace("m-", "");
    node.classList.toggle("active", step.active.includes(key));
    node.classList.toggle("result", step.result.includes(key));
    node.classList.toggle("dim", false);
    node.classList.toggle("hidden", !visible.has(key));
  });
  document.querySelectorAll(".op").forEach(node => {
    const key = node.id.replace("op-", "");
    node.classList.toggle("active", step.op.includes(key));
    node.classList.toggle("hidden", !step.op.includes(key));
  });
  document.querySelectorAll(".flow-line").forEach((line, i) => {
    line.classList.toggle("active", false);
    line.classList.toggle("hidden", true);
  });
  drawStepLinks(index);
}

function goNext() {
  index = (index + 1) % steps.length;
  render();
}

function goPrev() {
  index = (index - 1 + steps.length) % steps.length;
  render();
}

function schedule() {
  clearInterval(timer);
  if (playing) timer = setInterval(goNext, Number(document.getElementById("speed").value));
}

window.__forwardToggle = () => {
  playing = !playing;
  document.getElementById("play").textContent = playing ? "一時停止" : "再生";
  schedule();
};
window.__forwardNext = () => {
  goNext();
  schedule();
};
window.__forwardPrev = () => {
  goPrev();
  schedule();
};
document.getElementById("speed").addEventListener("input", schedule);

buildFormulas();
buildStage();
render();
schedule();
  </script>
</body>
</html>
