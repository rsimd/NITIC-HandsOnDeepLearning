<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">全結合層の計算を shape で可視化した図</title>
  <desc id="desc">出力 y を左辺に置き、重み W、入力 x、バイアス b の shape を四角形の辺の長さで表す。</desc>
  <style>
    .title { font: 700 22px sans-serif; fill: #1f2933; }
    .formula { font: 700 24px serif; fill: #1f2933; }
    .op { font: 700 32px serif; fill: #1f2933; }
    .label { font: 700 15px sans-serif; fill: #1f2933; }
    .small { font: 14px sans-serif; fill: #1f2933; }
    .note { font: 14px sans-serif; fill: #1f2933; }
  </style>

  <text class="title" x="40" y="55">全結合層（Linear レイヤ）の計算：shape を辺の長さで見る</text>
  <text class="formula" x="40" y="98">y = W · x + b</text>

  <rect x="70" y="180" width="45" height="120" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text class="label" x="92.5" y="216" text-anchor="middle">出力</text>
  <text class="label" x="92.5" y="238" text-anchor="middle">y</text>
  <text class="small" x="92.5" y="262" text-anchor="middle">(3, 1)</text>

  <text class="op" x="165" y="252" text-anchor="middle">=</text>

  <rect x="210" y="180" width="160" height="120" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text class="label" x="290" y="221" text-anchor="middle">重み W</text>
  <text class="small" x="290" y="246" text-anchor="middle">shape: (3, 4)</text>
  <text class="small" x="290" y="271" text-anchor="middle">3個の出力 × 4個の入力</text>

  <text class="op" x="410" y="252" text-anchor="middle">·</text>

  <rect x="450" y="160" width="45" height="160" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text class="label" x="472.5" y="220" text-anchor="middle">入力</text>
  <text class="label" x="472.5" y="242" text-anchor="middle">x</text>
  <text class="small" x="472.5" y="266" text-anchor="middle">(4, 1)</text>

  <text class="op" x="545" y="252" text-anchor="middle">+</text>

  <rect x="590" y="180" width="45" height="120" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text class="label" x="612.5" y="226" text-anchor="middle">b</text>
  <text class="small" x="612.5" y="251" text-anchor="middle">(3, 1)</text>

  <rect x="70" y="350" width="700" height="60" rx="6" fill="#f5f5f5" stroke="#666666"/>
  <text class="note" x="90" y="376">同じ shape 成分は，同じ長さの辺で表している。</text>
  <text class="note" x="90" y="398">W の高さ，y の高さ，b の高さはいずれも 3。W の幅と x の高さはいずれも 4。</text>

  <rect x="70" y="430" width="700" height="65" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text class="note" x="90" y="458">PyTorch の nn.Linear では，重みは shape (out_features, in_features) で保持される。</text>
  <text class="note" x="90" y="482">ミニバッチ入力 X の shape が (N, 4) のとき，実装上は Y = X @ W.T + b と計算される。</text>
</svg>
