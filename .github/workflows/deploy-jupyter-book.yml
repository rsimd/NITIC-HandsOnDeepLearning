# Jupyter Book 2 (MyST) を GitHub Pages に公開する
# Settings → Pages で Source を「GitHub Actions」に設定すること
name: Deploy Jupyter Book
on:
  push:
    branches: [main]

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build Jupyter Book site
        run: uv run jupyter-book build --html --ci

      # ノート内 iframe から参照する単体 HTML は、MyST が既定では成果物に含めないため手で同期する。
      - name: Sync standalone HTML for iframes
        run: |
          mkdir -p _build/html/python_etc _build/html/demos _build/html/slides
          cp notebooks/python_etc/*.html _build/html/python_etc/
          cp demos/*.html _build/html/demos/
          cp slides/*.html _build/html/slides/

      - name: Inject site interactions
        run: uv run python scripts/postprocess_html.py

      # Jekyll が _ で始まるパスを落とすため build/_assets 等が 404 になるのを防ぐ
      - name: Add .nojekyll for GitHub Pages
        run: touch _build/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - id: deployment
        uses: actions/deploy-pages@v4
